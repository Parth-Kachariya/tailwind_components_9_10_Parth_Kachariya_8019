<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tailwind</title>
    <link rel="stylesheet" href="./src/output.css">
</head>

<body>
    <div class="max-w-7xl mx-auto border">
        <h1 class="bg-gray-700 text-white text-center font-black text-4xl p-4">tailwind css </h1>
        <div class="grid min-h-full place-items-center bg-white md:bg-indigo-700 px-6 py-24 sm:py-32 lg:px-8">
            <div class="text-center">
                <p class="md:text-white text-4xl font-semibold text-indigo-600">404</p>
                <h1
                    class="mt-4 text-5xl font-semibold tracking-tight text-balance md:text-white text-gray-900 sm:text-7xl">
                    Page not
                    found</h1>
                <p class="mt-6 text-lg font-medium text-pretty text-gray-500 sm:text-xl/8">Sorry, we couldn’t find the
                    page you’re looking for.</p>
                <div class="mt-10 flex items-center justify-center gap-x-6">
                    <a href="#"
                        class="rounded-md border-2 border-green-700 md:border-white bg-indigo-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Go
                        back home</a>
                    <a href="#"
                        class="text-sm font-semibold border p-3 rounded-lg md:border-white text-gray-900 md:text-white">Contact
                        support <span aria-hidden="true">&rarr;</span></a>
                </div>
            </div>
        </div>
    </div>
    <!-- 
        sm : 640px ,40rem , @media (width >= 40rem) { ... }
        md : 768px ,48rem , @media (width >= 48rem) { ... }
        lg : 1024px ,64rem , @media (width >= 64rem) { ... }
        xl : 1280px ,80rem , @media (width >= 80rem) { ... }
        2xl : 1536px ,96rem ,@media (width >= 96rem) { ... }


        Container size reference


        Variant	Minimum width	CSS
        @3xs	16rem (256px)	        @container (width >= 16rem) { … }
        @2xs	18rem (288px)	        @container (width >= 18rem) { … }
        @xs	    20rem (320px)	        @container (width >= 20rem) { … }
        @sm	    24rem (384px)	        @container (width >= 24rem) { … }
        @md	    28rem (448px)	        @container (width >= 28rem) { … }
        @lg	    32rem (512px)	        @container (width >= 32rem) { … }
        @xl	    36rem (576px)	        @container (width >= 36rem) { … }
        @2xl	42rem (672px)	        @container (width >= 42rem) { … }
        @3xl	48rem (768px)	        @container (width >= 48rem) { … }
        @4xl	56rem (896px)	        @container (width >= 56rem) { … }
        @5xl	64rem (1024px)	        @container (width >= 64rem) { … }
        @6xl	72rem (1152px)	        @container (width >= 72rem) { … }
        @7xl	80rem (1280px)	        @container (width >= 80rem) { … }

    
    
    -->

</body>

</html>
